#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hyprland.org/Configuring/Variables/

# https://wiki.hyprland.org/Configuring/Variables/#general
general {
    gaps_in = $gaps-i
    gaps_out = $gaps-o

    border_size = $border

    # https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    col.active_border = $color7
    col.inactive_border = $color8

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle

    snap {
        enabled = true;
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#decoration
decoration {
    rounding = $round
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.00
    inactive_opacity = 1.00

    border_part_of_window = true

    # https://wiki.hyprland.org/Configuring/Variables/#blur
    blur {
        enabled = false
        size = 15
        xray = true
        passes = 1
        special = false
    }

    shadow {
        enabled = false
    }

    dim_special = 0.7
    dim_inactive = true
    dim_strength = 0.1
}

# https://wiki.hyprland.org/Configuring/Variables/#animations
animations {
    enabled = true

    # Default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = cubic,       0.65, 0.05, 0.36, 1
    bezier = easeOutCirc, 0,    0.5,  0.5,  1
    bezier = easeOutBack, 0.34, 1.56, 0.64, 1
    bezier = test,        0.5,  1.75, 0.5,  0.5

    animation = global,     1, 1, easeOutCirc

    animation = windowsIn,  1, 1, easeOutCirc, slide
    animation = fadeIn,     0
    animation = windowsOut, 1, 1, easeOutCirc, gnomed
    animation = fadeOut,    1, 10, cubic

    animation = fade, 1, 1, cubic

    animation = layersIn,      1, 1, cubic, slide
    animation = fadeLayersIn,  0
    animation = layersOut,     1, 1, cubic, slide
    animation = fadeLayersOut, 1, 10, cubic

    animation = fadePopupsIn,  0
    animation = fadePopupsOut, 1, 10, cubic

    animation = workspaces, 1, 2, easeOutCirc, slide

    animation = specialWorkspace, 1, 2, easeOutCirc, fade
}

layerrule {
    name = notifications-animation
    match:namespace = swaync-notification-window
    animation = layersIn
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]


group {

    col.border_active = $color7
    col.border_inactive = $color8

    groupbar {
        font_family = FontAwesome, FiraCode, monospace
        font_size = 18
        height = 10

        indicator_height = 16
        indicator_gap = 0
        rounding = $round

        render_titles = false

        col.active = $color7
        col.inactive = $color8

        gaps_out = $gaps-o
        keep_upper_gap = false
    }
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(

    vfr = true
    middle_click_paste = false
}

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

layout {
    # single_window_aspect_ratio = 2 1
}

binds {
    allow_workspace_cycles = false
}

cursor {
    inactive_timeout = 60
    persistent_warps = true
    warp_on_change_workspace = true
    warp_on_toggle_special = true
}

ecosystem {
    no_donation_nag = true
}