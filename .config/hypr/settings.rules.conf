##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# this fixes some issues with applications that "create" a new window for menus.
# windowrule = stay_focused on, match:float yes

windowrule {
    name = kitty-rules
    match:class = kitty
    float = on
    center = on
    size = 1200 700
}

windowrule {
    name = nautilus-rules
    match:class = org.gnome.Nautilus
    float = on
    center = on
    size = 900 700
}

windowrule {
    name = calculator-rules
    match:class = org.gnome.Calculator
    float = on
    move = (monitor_w*0.8-$gaps-o-$border) (monitor_h*0.5-$gaps-o-$border)
    size = (monitor_w*0.2) (monitor_h*0.5)
}

windowrule {
    name = soffice-export-rules
    match:class = soffice
    match:title = "Image Export"
    float = on
    center = on
    size = 900 700
}

windowrule {
    name = spotify-rules
    match:class = spotify
    workspace = special:F3
    no_initial_focus = on
}

windowrule {
    name = signal-rules
    match:class = signal
    workspace = special:S
    pseudo = on
    size = (monitor_w*0.5) (monitor_h*0.75)
}

windowrule {
    name = discord-rules
    match:class = discord
    workspace = special:S
    pseudo = on
    size = (monitor_w*0.5) (monitor_h*0.75)
}

windowrule {
    name = no-maximize-rules
    match:class = *
    suppress_event = maximize
}

windowrule {
    name = dragging-fix-rules
    match:class = "^$"
    match:title = "^$"
    match:xwayland = yes
    match:float = yes
    match:fullscreen = no
    match:pin = no
    no_focus = on
}

# this makes windows seamless when they are the only one on the workspace
workspace = w[tv1], gapsout:4
workspace = w[tg1], gapsout:4

